<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JSON 格式化工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  --radius-sm:6px;
  --radius-md:8px;
}
body{
  font-family:var(--font);
  padding:20px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  -webkit-font-smoothing:antialiased;
  transition:background .25s,color .25s;
}

/* ══════════════════════════════════
   DARK
══════════════════════════════════ */
body.dark{
  background:#1c1c1e;
  color:rgba(255,255,255,.85);
}
body.dark h1{color:rgba(255,255,255,.9);}
body.dark .subtitle{color:rgba(255,255,255,.5);}
body.dark .btn{
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.65);
}
body.dark .btn:hover{
  background:rgba(255,255,255,.14);
  color:rgba(255,255,255,.9);
}
body.dark .btn-primary{
  background:#0a7aff;
  color:#fff;
}
body.dark .btn-primary:hover{
  background:#0066dd;
}
body.dark #themeDot{background:#ffffff;}
body.dark .panel{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
}
body.dark .panel-title{color:rgba(255,255,255,.5);}
body.dark textarea{
  background:rgba(0,0,0,.3);
  border-color:rgba(255,255,255,.1);
  color:rgba(255,255,255,.9);
}
body.dark textarea::placeholder{color:rgba(255,255,255,.3);}
body.dark textarea:focus{border-color:rgba(10,122,255,.6);}
body.dark .status.error{color:#ff453a;}
body.dark .status.success{color:#34c759;}

/* ══════════════════════════════════
   LIGHT
══════════════════════════════════ */
body.light{
  background:#f2f2f7;
  color:rgba(0,0,0,.85);
}
body.light h1{color:rgba(0,0,0,.85);}
body.light .subtitle{color:rgba(0,0,0,.5);}
body.light .btn{
  background:rgba(0,0,0,.05);
  color:rgba(0,0,0,.55);
}
body.light .btn:hover{
  background:rgba(0,0,0,.09);
  color:rgba(0,0,0,.82);
}
body.light .btn-primary{
  background:#0a7aff;
  color:#fff;
}
body.light .btn-primary:hover{
  background:#0066dd;
}
body.light #themeDot{background:#000000;}
body.light .panel{
  background:rgba(255,255,255,.7);
  border:1px solid rgba(0,0,0,.08);
}
body.light .panel-title{color:rgba(0,0,0,.5);}
body.light textarea{
  background:rgba(255,255,255,.9);
  border-color:rgba(0,0,0,.1);
  color:rgba(0,0,0,.85);
}
body.light textarea::placeholder{color:rgba(0,0,0,.3);}
body.light textarea:focus{border-color:rgba(10,122,255,.5);}
body.light .status.error{color:#ff3b30;}
body.light .status.success{color:#34c759;}

/* ══════════════════════════════════
   SHARED STRUCTURAL
══════════════════════════════════ */
.container{
  max-width:1200px;
  width:100%;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:16px;
  flex:1;
}
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
}
.header-left{
  flex:1;
  min-width:200px;
}
h1{
  font-size:24px;
  font-weight:600;
  margin-bottom:4px;
  display:flex;
  align-items:center;
  gap:8px;
}
.subtitle{
  font-size:13px;
  margin-bottom:12px;
}
#themeDot{
  width:10px;
  height:10px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  flex-shrink:0;
  padding:0;
  transition:transform .15s,opacity .15s;
}
#themeDot:hover{
  transform:scale(1.3);
  opacity:.8;
}
.toolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.btn{
  padding:8px 16px;
  border-radius:var(--radius-sm);
  font-size:13px;
  font-weight:500;
  font-family:var(--font);
  cursor:pointer;
  transition:all .12s;
  border:none;
}
.panels{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  flex:1;
  min-height:0;
}
.panel{
  display:flex;
  flex-direction:column;
  border-radius:var(--radius-md);
  padding:12px;
  min-height:0;
}
.panel-title{
  font-size:11px;
  font-weight:600;
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:.5px;
}
textarea{
  flex:1;
  border-radius:var(--radius-sm);
  padding:12px;
  font-family:'SF Mono',Monaco,Consolas,monospace;
  font-size:13px;
  line-height:1.6;
  resize:none;
  outline:none;
  min-height:400px;
  transition:border-color .15s;
}
.status{
  margin-top:8px;
  font-size:12px;
  min-height:20px;
  display:flex;
  align-items:center;
  gap:6px;
}
.status-icon{
  font-size:14px;
}
@media(max-width:768px){
  .panels{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body class="dark">
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>
        🔧 JSON 格式化工具
        <button id="themeDot" title="切换主题"></button>
      </h1>
      <p class="subtitle">输入 JSON 数据，支持格式化、压缩、转义/反转义</p>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="formatJSON()">格式化 →</button>
      <button class="btn" onclick="compressJSON()">压缩 →</button>
      <button class="btn" onclick="escapeJSON()">转义 →</button>
      <button class="btn" onclick="unescapeJSON()">反转义 →</button>
      <button class="btn" onclick="clearAll()">清空</button>
      <button class="btn" onclick="copyOutput()">复制输出</button>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-title">输入</div>
      <textarea id="input" placeholder='粘贴 JSON 数据，例如：{"name":"测试","value":123}'></textarea>
      <div class="status" id="inputStatus"></div>
    </div>

    <div class="panel">
      <div class="panel-title">输出</div>
      <textarea id="output" readonly placeholder="处理后的结果会显示在这里"></textarea>
      <div class="status" id="outputStatus"></div>
    </div>
  </div>
</div>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');
const inputStatus = document.getElementById('inputStatus');
const outputStatus = document.getElementById('outputStatus');

function setStatus(el, msg, type){
  el.className = 'status ' + (type||'');
  const icon = type==='error' ? '❌' : type==='success' ? '✅' : 'ℹ️';
  el.innerHTML = `<span class="status-icon">${icon}</span>${msg}`;
}

function clearStatus(){
  inputStatus.innerHTML = '';
  outputStatus.innerHTML = '';
}

function formatJSON(){
  clearStatus();
  const input = inputEl.value.trim();
  if(!input){
    setStatus(inputStatus, '输入为空', 'error');
    return;
  }
  try{
    const obj = JSON.parse(input);
    outputEl.value = JSON.stringify(obj, null, 2);
    setStatus(outputStatus, '格式化成功', 'success');
  }catch(e){
    setStatus(inputStatus, '解析失败: ' + e.message, 'error');
  }
}

function compressJSON(){
  clearStatus();
  const input = inputEl.value.trim();
  if(!input){
    setStatus(inputStatus, '输入为空', 'error');
    return;
  }
  try{
    const obj = JSON.parse(input);
    outputEl.value = JSON.stringify(obj);
    setStatus(outputStatus, '压缩成功', 'success');
  }catch(e){
    setStatus(inputStatus, '解析失败: ' + e.message, 'error');
  }
}

function escapeJSON(){
  clearStatus();
  const input = inputEl.value.trim();
  if(!input){
    setStatus(inputStatus, '输入为空', 'error');
    return;
  }
  try{
    const obj = JSON.parse(input);
    const jsonStr = JSON.stringify(obj);
    outputEl.value = JSON.stringify(jsonStr);
    setStatus(outputStatus, '转义成功（双引号已转义）', 'success');
  }catch(e){
    setStatus(inputStatus, '解析失败: ' + e.message, 'error');
  }
}

function unescapeJSON(){
  clearStatus();
  const input = inputEl.value.trim();
  if(!input){
    setStatus(inputStatus, '输入为空', 'error');
    return;
  }
  try{
    const unescaped = JSON.parse(input);
    if(typeof unescaped === 'string'){
      const obj = JSON.parse(unescaped);
      outputEl.value = JSON.stringify(obj, null, 2);
      setStatus(outputStatus, '反转义并格式化成功', 'success');
    }else{
      outputEl.value = JSON.stringify(unescaped, null, 2);
      setStatus(outputStatus, '已格式化（输入未转义）', 'success');
    }
  }catch(e){
    setStatus(inputStatus, '解析失败: ' + e.message, 'error');
  }
}

function clearAll(){
  inputEl.value = '';
  outputEl.value = '';
  clearStatus();
  setStatus(inputStatus, '已清空', 'success');
}

function copyOutput(){
  const text = outputEl.value;
  if(!text){
    setStatus(outputStatus, '输出为空', 'error');
    return;
  }
  navigator.clipboard.writeText(text).then(()=>{
    setStatus(outputStatus, '已复制到剪贴板', 'success');
    setTimeout(clearStatus, 2000);
  }).catch(()=>{
    setStatus(outputStatus, '复制失败', 'error');
  });
}

// 快捷键支持
inputEl.addEventListener('keydown', e=>{
  if((e.metaKey||e.ctrlKey) && e.key==='Enter'){
    e.preventDefault();
    formatJSON();
  }
});

// 主题切换
const THEME_KEY = 'json-formatter-theme';
function applyTheme(t){
  document.body.classList.remove('dark','light');
  document.body.classList.add(t);
  localStorage.setItem(THEME_KEY, t);
}
applyTheme(localStorage.getItem(THEME_KEY) || 'dark');
document.getElementById('themeDot').addEventListener('click', ()=>{
  applyTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
});
</script>
</body>
</html>
