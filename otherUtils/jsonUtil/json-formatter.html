<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JSON 格式化工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  --radius-sm:6px;
  --radius-md:8px;
}
body{
  font-family:var(--font);
  padding:20px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  -webkit-font-smoothing:antialiased;
  transition:background .25s,color .25s;
}

/* ══════════════════════════════════

══════════════════════════════════ */

  background:#1c1c1e;
  color:rgba(255,255,255,.85);
}
body.dark h1{color:rgba(255,255,255,.9);}
body.dark .subtitle{color:rgba(255,255,255,.5);}
body.dark .btn{
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.65);
}
body.dark .btn:hover{
  background:rgba(255,255,255,.14);
  color:rgba(255,255,255,.9);
}
body.dark .btn-primary{
  background:#0a7aff;
  color:#fff;
}
body.dark .btn-primary:hover{
  background:#0066dd;
}
body.dark #themeDot{background:#ffffff;}
body.dark .panel{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
}
body.dark .panel-title{color:rgba(255,255,255,.5);}
body.dark textarea{
  background:rgba(0,0,0,.3);
  border-color:rgba(255,255,255,.1);
  color:rgba(255,255,255,.9);
}
body.dark textarea::placeholder{color:rgba(255,255,255,.3);}
body.dark textarea:focus{border-color:rgba(10,122,255,.6);}
body.dark .code-display{
  background:rgba(0,0,0,.3);
  border-color:rgba(255,255,255,.1);
  color:rgba(255,255,255,.9);
}
body.dark .json-key{color:#d4a76a;}
body.dark .json-string{color:#a5d6a7;}
body.dark .json-number{color:#9ab4f5;}
body.dark .json-boolean{color:#ce93d8;}
body.dark .json-null{color:#ef9a9a;}
body.dark .json-bracket{color:rgba(255,255,255,.6);cursor:pointer;transition:background .15s;}
body.dark .json-bracket:hover{background:rgba(255,255,255,.08);border-radius:2px;}
body.dark .bracket-match{background:rgba(10,132,255,.25)!important;border-radius:2px;animation:bracketFlash .4s ease;}
body.dark .data-highlight{background:rgba(255,193,7,.25)!important;border-radius:2px;animation:dataFlash .4s ease;}
body.dark .json-error{background:rgba(255,69,58,.2)!important;color:#ff6b6b!important;border-bottom:2px solid #ff453a;}
body.dark .status.error{color:#ff453a;}
body.dark .status.success{color:#34c759;}

/* ══════════════════════════════════
   LIGHT
══════════════════════════════════ */
body.light{
  background:#f2f2f7;
  color:rgba(0,0,0,.85);
}
body.light h1{color:rgba(0,0,0,.85);}
body.light .subtitle{color:rgba(0,0,0,.5);}
body.light .btn{
  background:rgba(0,0,0,.05);
  color:rgba(0,0,0,.55);
}
body.light .btn:hover{
  background:rgba(0,0,0,.09);
  color:rgba(0,0,0,.82);
}
body.light .btn-primary{
  background:#0a7aff;
  color:#fff;
}
body.light .btn-primary:hover{
  background:#0066dd;
}
body.light #themeDot{background:#000000;}
body.light .panel{
  background:rgba(255,255,255,.8);
  border:1px solid rgba(0,0,0,.12);
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
body.light .panel-title{color:rgba(0,0,0,.5);}
body.light textarea{
  background:rgba(255,255,255,.95);
  border-color:rgba(0,0,0,.15);
  color:rgba(0,0,0,.85);
}
body.light textarea::placeholder{color:rgba(0,0,0,.3);}
body.light textarea:focus{border-color:rgba(10,122,255,.5);}
body.light .code-display{
  background:rgba(255,255,255,.95);
  border-color:rgba(0,0,0,.15);
  color:rgba(0,0,0,.85);
}
body.light .json-key{color:#b8860b;}
body.light .json-string{color:#2e7d32;}
body.light .json-number{color:#1565c0;}
body.light .json-boolean{color:#7b1fa2;}
body.light .json-null{color:#c62828;}
body.light .json-bracket{color:rgba(0,0,0,.5);cursor:pointer;transition:background .15s;}
body.light .json-bracket:hover{background:rgba(0,0,0,.05);border-radius:2px;}
body.light .bracket-match{background:rgba(10,122,255,.2)!important;border-radius:2px;animation:bracketFlash .4s ease;}
body.light .data-highlight{background:rgba(255,193,7,.3)!important;border-radius:2px;animation:dataFlash .4s ease;}
body.light .json-error{background:rgba(255,59,48,.15)!important;color:#d32f2f!important;border-bottom:2px solid #ff3b30;}
body.light .status.error{color:#ff3b30;}
body.light .status.success{color:#34c759;}

/* ══════════════════════════════════
   SHARED STRUCTURAL
══════════════════════════════════ */
.container{
  max-width:1200px;
  width:100%;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:16px;
  flex:1;
}
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
}
.header-left{
  flex:1;
  min-width:200px;
}
h1{
  font-size:24px;
  font-weight:600;
  margin-bottom:4px;
  display:flex;
  align-items:center;
  gap:8px;
}
.subtitle{
  font-size:13px;
  margin-bottom:12px;
}
#themeDot{
  width:10px;
  height:10px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  flex-shrink:0;
  padding:0;
  transition:transform .15s,opacity .15s;
}
#themeDot:hover{
  transform:scale(1.3);
  opacity:.8;
}
.toolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.btn{
  padding:8px 16px;
  border-radius:var(--radius-sm);
  font-size:13px;
  font-weight:500;
  font-family:var(--font);
  cursor:pointer;
  transition:all .12s;
  border:none;
}
.panels{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  flex:1;
  min-height:0;
}
.panel{
  display:flex;
  flex-direction:column;
  border-radius:var(--radius-md);
  padding:12px;
  min-height:0;
}
.panel-title{
  font-size:11px;
  font-weight:600;
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:.5px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.btn-mini{
  padding:4px 8px;
  border-radius:4px;
  font-size:11px;
  font-weight:500;
  cursor:pointer;
  transition:all .12s;
  border:none;
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.65);
}
.btn-mini:hover{
  background:rgba(255,255,255,.14);
  color:rgba(255,255,255,.9);
}
textarea{
  flex:1;
  border-radius:var(--radius-sm);
  padding:12px;
  font-family:'SF Mono',Monaco,Consolas,monospace;
  font-size:13px;
  line-height:1.6;
  resize:none;
  outline:none;
  min-height:400px;
  transition:border-color .15s;
  border:1px solid;
}
.code-display{
  flex:1;
  border-radius:var(--radius-sm);
  padding:12px;
  font-family:'SF Mono',Monaco,Consolas,monospace;
  font-size:13px;
  line-height:1.6;
  overflow:auto;
  min-height:400px;
  border:1px solid;
  white-space:pre-wrap;
  word-wrap:break-word;
  tab-size:2;
  outline:none;
}
.code-display[contenteditable="true"]:focus{
  border-color:rgba(10,122,255,.5);
}
.code-display:empty:before{
  content:attr(placeholder);
  color:rgba(255,255,255,.3);
  pointer-events:none;
}
body.light .code-display:empty:before{
  color:rgba(0,0,0,.3);
}
.json-key{font-weight:600;}
.json-null{font-weight:600;}
.json-bracket{padding:0 2px;user-select:none;}
@keyframes bracketFlash{
  0%,100%{opacity:1;}
  50%{opacity:.5;}
}
@keyframes dataFlash{
  0%,100%{opacity:1;}
  50%{opacity:.5;}
}
.status{
  margin-top:8px;
  font-size:12px;
  min-height:20px;
  display:flex;
  align-items:center;
  gap:6px;
}
.status-icon{
  font-size:14px;
}
@media(max-width:768px){
  .panels{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body class="dark">
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>
        🔧 JSON 格式化工具
        <button id="themeDot" title="切换主题"></button>
      </h1>
      <p class="subtitle">输入 JSON 数据，支持格式化、压缩、转义/反转义</p>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="formatJSON()">格式化 →</button>
      <button class="btn" onclick="compressJSON()">压缩 →</button>
      <button class="btn" onclick="escapeJSON()">转义 →</button>
      <button class="btn" onclick="unescapeJSON()">反转义 →</button>
      <button class="btn" onclick="reverseFormat()">← 反向</button>
      <button class="btn" onclick="clearAll()">清空</button>
      <button class="btn" onclick="copyOutput()">复制输出</button>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-title">输入</div>
      <div id="input" class="code-display" contenteditable="true" placeholder='粘贴 JSON 数据，例如：{"name":"测试","value":123}'></div>
      <div class="status" id="inputStatus"></div>
    </div>

    <div class="panel">
      <div class="panel-title">
        输出
        <button class="btn-mini" onclick="formatOutput()" title="格式化输出框内容">🔄 格式化输出框</button>
      </div>
      <div id="output" class="code-display" contenteditable="true"></div>
      <div class="status" id="outputStatus"></div>
    </div>
  </div>
</div>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');
const inputStatus = document.getElementById('inputStatus');
const outputStatus = document.getElementById('outputStatus');

function setStatus(el, msg, type){
  el.className = 'status ' + (type||'');
  const icon = type==='error' ? '❌' : type==='success' ? '✅' : 'ℹ️';
  el.innerHTML = `<span class="status-icon">${icon}</span>${msg}`;
}

function clearStatus(){
  inputStatus.innerHTML = '';
  outputStatus.innerHTML = '';
}

function highlightJSON(jsonStr){
  // 建立括号配对映射
  let bracketId = 0;
  const bracketMap = new Map();
  const stack = [];
  
  for(let i=0; i<jsonStr.length; i++){
    const ch = jsonStr[i];
    if(ch==='{'||ch==='['){
      const id = bracketId++;
      stack.push({id, pos:i});
    }else if(ch==='}'||ch===']'){
      if(stack.length>0){
        const open = stack.pop();
        bracketMap.set(open.pos, {pair:i, id:open.id, type:'open'});
        bracketMap.set(i, {pair:open.pos, id:open.id, type:'close'});
      }
    }
  }
  
  // 逐字符处理，生成 HTML
  let result = '';
  let dataId = 0;
  let i = 0;
  
  while(i < jsonStr.length){
    const ch = jsonStr[i];
    
    // 处理括号
    if(ch==='{'||ch==='}'||ch==='['||ch===']'){
      const info = bracketMap.get(i);
      if(info){
        result += '<span class="json-bracket" data-bracket-id="' + info.id + '" data-bracket-type="' + info.type + '" data-pair-pos="' + info.pair + '">' + ch + '</span>';
      }else{
        result += ch;
      }
      i++;
    }
    // 处理字符串（包括 key 和 value）
    else if(ch==='"'){
      let str = '"';
      i++;
      while(i < jsonStr.length){
        const c = jsonStr[i];
        str += c;
        if(c==='"' && jsonStr[i-1]!=='\\'){
          i++;
          break;
        }
        i++;
      }
      // 判断是 key 还是 value
      let j = i;
      while(j < jsonStr.length && /\s/.test(jsonStr[j])) j++;
      if(jsonStr[j]===':'){
        result += '<span class="json-key json-data" data-id="' + (dataId++) + '">' + str + '</span>';
      }else{
        result += '<span class="json-string json-data" data-id="' + (dataId++) + '">' + str + '</span>';
      }
    }
    // 处理数字
    else if(/\d/.test(ch) || (ch==='-' && i+1<jsonStr.length && /\d/.test(jsonStr[i+1]))){
      let num = '';
      while(i < jsonStr.length && /[\d.\-]/.test(jsonStr[i])){
        num += jsonStr[i];
        i++;
      }
      result += '<span class="json-number json-data" data-id="' + (dataId++) + '">' + num + '</span>';
    }
    // 处理 true
    else if(jsonStr.substr(i, 4)==='true'){
      result += '<span class="json-boolean json-data" data-id="' + (dataId++) + '">true</span>';
      i += 4;
    }
    // 处理 false
    else if(jsonStr.substr(i, 5)==='false'){
      result += '<span class="json-boolean json-data" data-id="' + (dataId++) + '">false</span>';
      i += 5;
    }
    // 处理 null
    else if(jsonStr.substr(i, 4)==='null'){
      result += '<span class="json-null json-data" data-id="' + (dataId++) + '">null</span>';
      i += 4;
    }
    // 其他字符直接输出
    else{
      result += ch;
      i++;
    }
  }
  
  return result;
}

function setOutput(text, highlight=true){
  if(highlight){
    outputEl.innerHTML = highlightJSON(text);
    setupBracketMatching();
    setupInputOutputSync();
  }else{
    outputEl.textContent = text;
  }
}

function setupBracketMatching(){
  const brackets = outputEl.querySelectorAll('.json-bracket');
  const dataNodes = outputEl.querySelectorAll('.json-data');
  
  // 括号点击：持久化高亮，清除数据高亮
  brackets.forEach(br=>{
    br.addEventListener('click', function(e){
      e.stopPropagation();
      
      // 清除数据高亮
      outputEl.querySelectorAll('.data-highlight').forEach(el=>el.classList.remove('data-highlight'));
      
      // 清除之前的括号高亮
      outputEl.querySelectorAll('.bracket-match').forEach(el=>el.classList.remove('bracket-match'));
      
      const id = this.getAttribute('data-bracket-id');
      
      // 高亮当前和配对括号（持久化，不自动消失）
      this.classList.add('bracket-match');
      brackets.forEach(other=>{
        if(other!==this && other.getAttribute('data-bracket-id')===id){
          other.classList.add('bracket-match');
        }
      });
    });
  });
  
  // 数据节点点击：持久化高亮，清除括号高亮
  dataNodes.forEach(node=>{
    node.addEventListener('click', function(e){
      e.stopPropagation();
      
      // 清除括号高亮
      outputEl.querySelectorAll('.bracket-match').forEach(el=>el.classList.remove('bracket-match'));
      
      // 清除之前的数据高亮
      outputEl.querySelectorAll('.data-highlight').forEach(el=>el.classList.remove('data-highlight'));
      
      // 高亮当前数据节点（持久化）
      this.classList.add('data-highlight');
    });
  });
  
  // 输出区域点击空白处：清除所有高亮
  outputEl.addEventListener('click', function(e){
    if(e.target === outputEl){
      outputEl.querySelectorAll('.bracket-match').forEach(el=>el.classList.remove('bracket-match'));
      outputEl.querySelectorAll('.data-highlight').forEach(el=>el.classList.remove('data-highlight'));
    }
  });
}

// 左右联动高亮功能
let syncListenersAttached = false;
function setupInputOutputSync(){
  // 避免重复绑定事件监听器
  if(syncListenersAttached) return;
  syncListenersAttached = true;
  
  inputEl.addEventListener('click', syncHighlight);
  inputEl.addEventListener('keyup', syncHighlight);
  inputEl.addEventListener('input', syncHighlight);
  
  function syncHighlight(){
    const cursorPos = inputEl.selectionStart;
    const inputText = inputEl.textContent;
    
    // 清除括号高亮（互斥）
    outputEl.querySelectorAll('.bracket-match').forEach(el=>el.classList.remove('bracket-match'));
    
    // 清除之前的数据高亮
    outputEl.querySelectorAll('.data-highlight').forEach(el=>el.classList.remove('data-highlight'));
    
    if(!inputText.trim()) return;
    
    let targetText = null;
    let isKey = false;
    
    // 策略1: 检查光标是否在字符串内（包括引号）
    let inString = false;
    let stringStart = -1;
    let stringEnd = -1;
    
    for(let i = 0; i < inputText.length; i++){
      if(inputText[i] === '"' && (i === 0 || inputText[i-1] !== '\\')){
        if(!inString){
          stringStart = i;
          inString = true;
        }else{
          stringEnd = i;
          if(cursorPos >= stringStart && cursorPos <= stringEnd + 1){
            // 光标在这个字符串内
            targetText = inputText.substring(stringStart, stringEnd + 1);
            // 检查是否是 key（后面跟冒号）
            let j = stringEnd + 1;
            while(j < inputText.length && /\s/.test(inputText[j])) j++;
            if(inputText[j] === ':'){
              isKey = true;
            }
            break;
          }
          inString = false;
        }
      }
    }
    
    // 策略2: 如果不在字符串内，检查数字、布尔、null
    if(!targetText){
      // 向前查找 token 边界
      let start = cursorPos;
      while(start > 0 && /[\w.\-]/.test(inputText[start - 1])){
        start--;
      }
      
      // 向后查找 token 边界
      let end = cursorPos;
      while(end < inputText.length && /[\w.\-]/.test(inputText[end])){
        end++;
      }
      
      targetText = inputText.substring(start, end);
    }
    
    if(targetText && targetText !== ''){
      // 在输出区域查找对应的节点并高亮
      const dataNodes = outputEl.querySelectorAll('.json-data');
      
      dataNodes.forEach(node=>{
        const nodeText = node.textContent.trim();
        
        if(isKey){
          // 光标在 key 上：匹配 key（可能带或不带冒号）
          if(nodeText === targetText + ':' || nodeText === targetText){
            node.classList.add('data-highlight');
          }
        }else{
          // 光标在 value 上：精确匹配
          if(nodeText === targetText){
            node.classList.add('data-highlight');
          }
        }
      });
    }
  }
}

function formatJSON(){
  clearStatus();
  const input = inputEl.textContent.trim();
  if(!input){
    setStatus(inputStatus, '输入为空', 'error');
    return;
  }
  try{
    const obj = JSON.parse(input);
    const formatted = JSON.stringify(obj, null, 2);
    setOutput(formatted, true);
    setStatus(outputStatus, '格式化成功', 'success');
    // 清除输入框的错误标记
    inputEl.innerHTML = escapeHtml(input);
  }catch(e){
    // 容错格式化：在输入框和输出框都标记错误
    const errorMsg = e.message.replace(/\s+at position \d+/i, '').replace(/\s+in JSON at position \d+/i, '');
    setStatus(inputStatus, errorMsg, 'error');
    
    // 在输入框内标记错误
    const errorMatch = e.message.match(/position (\d+)/);
    const errorPos = errorMatch ? parseInt(errorMatch[1]) : -1;
    
    if(errorPos !== -1 && errorPos < input.length){
      // 在输入框标记错误位置
      const before = escapeHtml(input.substring(0, errorPos));
      const errorChar = input.substring(errorPos, errorPos + 10); // 取错误位置后10个字符
      const after = escapeHtml(input.substring(errorPos + 10));
      inputEl.innerHTML = before + '<span class="json-error" title="错误位置">' + escapeHtml(errorChar) + '</span>' + after;
    }
    
    // 尝试部分格式化输出
    try{
      let formatted = '';
      let indent = 0;
      let inString = false;
      let errorMarked = false;
      
      for(let i = 0; i < input.length; i++){
        const ch = input[i];
        const isErrorPos = (errorPos !== -1 && i >= errorPos && i < errorPos + 10 && !errorMarked);
        
        if(ch === '"' && (i === 0 || input[i-1] !== '\\')){
          inString = !inString;
        }
        
        if(isErrorPos){
          formatted += '<span class="json-error" title="错误位置">';
          errorMarked = true;
        }
        
        if(!inString){
          if(ch === '{' || ch === '['){
            formatted += ch + '\n' + '  '.repeat(++indent);
          }else if(ch === '}' || ch === ']'){
            formatted += '\n' + '  '.repeat(--indent) + ch;
          }else if(ch === ','){
            formatted += ch + '\n' + '  '.repeat(indent);
          }else if(ch === ':'){
            formatted += ': ';
          }else if(!/\s/.test(ch)){
            formatted += ch;
          }
        }else{
          formatted += ch;
        }
        
        if(errorMarked && i >= errorPos + 9){
          formatted += '</span>';
          errorMarked = false;
        }
      }
      
      if(errorMarked){
        formatted += '</span>';
      }
      
      outputEl.innerHTML = formatted;
      setStatus(outputStatus, '部分格式化（有错误）', 'error');
    }catch(err){
      outputEl.textContent = input;
      setStatus(outputStatus, '无法格式化', 'error');
    }
  }
}

function escapeHtml(text){
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function reverseFormat(){
  clearStatus();
  const outputText = outputEl.textContent.trim();
  if(!outputText){
    setStatus(outputStatus, '输出为空', 'error');
    return;
  }
  try{
    // 解析输出区的 JSON
    const obj = JSON.parse(outputText);
    // 压缩后输出回输入框（恢复原格式）
    const compressed = JSON.stringify(obj);
    inputEl.textContent = compressed;
    setStatus(inputStatus, '已反向输出（压缩格式）', 'success');
  }catch(e){
    const errorMsg = e.message.replace(/\s+at position \d+/i, '').replace(/\s+in JSON at position \d+/i, '');
    setStatus(outputStatus, '输出区 JSON 无效: ' + errorMsg, 'error');
  }
}

function formatOutput(){
  clearStatus();
  const outputText = outputEl.textContent.trim();
  if(!outputText){
    setStatus(outputStatus, '输出为空', 'error');
    return;
  }
  try{
    // 解析并格式化输出区的内容
    const obj = JSON.parse(outputText);
    const formatted = JSON.stringify(obj, null, 2);
    setOutput(formatted, true);
    setStatus(outputStatus, '输出框格式化成功', 'success');
  }catch(e){
    const errorMsg = e.message.replace(/\s+at position \d+/i, '').replace(/\s+in JSON at position \d+/i, '');
    setStatus(outputStatus, '输出框 JSON 无效: ' + errorMsg, 'error');
  }
}

function compressJSON(){
  clearStatus();
  const input = inputEl.textContent.trim();
  if(!input){
    setStatus(inputStatus, '输入为空', 'error');
    return;
  }
  try{
    const obj = JSON.parse(input);
    const compressed = JSON.stringify(obj);
    setOutput(compressed, false);
    setStatus(outputStatus, '压缩成功', 'success');
  }catch(e){
    setStatus(inputStatus, '解析失败: ' + e.message, 'error');
  }
}

function escapeJSON(){
  clearStatus();
  const input = inputEl.textContent.trim();
  if(!input){
    setStatus(inputStatus, '输入为空', 'error');
    return;
  }
  try{
    const obj = JSON.parse(input);
    const jsonStr = JSON.stringify(obj);
    const escaped = JSON.stringify(jsonStr);
    setOutput(escaped, false);
    setStatus(outputStatus, '转义成功（双引号已转义）', 'success');
  }catch(e){
    setStatus(inputStatus, '解析失败: ' + e.message, 'error');
  }
}

function unescapeJSON(){
  clearStatus();
  const input = inputEl.textContent.trim();
  if(!input){
    setStatus(inputStatus, '输入为空', 'error');
    return;
  }
  try{
    const unescaped = JSON.parse(input);
    if(typeof unescaped === 'string'){
      const obj = JSON.parse(unescaped);
      const formatted = JSON.stringify(obj, null, 2);
      setOutput(formatted, true);
      setStatus(outputStatus, '反转义并格式化成功', 'success');
    }else{
      const formatted = JSON.stringify(unescaped, null, 2);
      setOutput(formatted, true);
      setStatus(outputStatus, '已格式化（输入未转义）', 'success');
    }
  }catch(e){
    setStatus(inputStatus, '解析失败: ' + e.message, 'error');
  }
}

function clearAll(){
  inputEl.textContent = '';
  outputEl.textContent = '';
  clearStatus();
  setStatus(inputStatus, '已清空', 'success');
}

function copyOutput(){
  const text = outputEl.textContent;
  if(!text){
    setStatus(outputStatus, '输出为空', 'error');
    return;
  }
  navigator.clipboard.writeText(text).then(()=>{
    setStatus(outputStatus, '已复制到剪贴板', 'success');
    setTimeout(clearStatus, 2000);
  }).catch(()=>{
    setStatus(outputStatus, '复制失败', 'error');
  });
}

// 快捷键支持
inputEl.addEventListener('keydown', e=>{
  if((e.metaKey||e.ctrlKey) && e.key==='Enter'){
    e.preventDefault();
    formatJSON();
  }
});

// 主题切换
const THEME_KEY = 'json-formatter-theme';
function applyTheme(t){
  document.body.classList.remove('dark','light');
  document.body.classList.add(t);
  localStorage.setItem(THEME_KEY, t);
}
applyTheme(localStorage.getItem(THEME_KEY) || 'dark');
document.getElementById('themeDot').addEventListener('click', ()=>{
  applyTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
});
</script>
